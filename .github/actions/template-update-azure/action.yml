---
name: "Template Update Azure"
description: >-
  Sync an entire upstream template repository into a base directory, EXCLUDING a
  caller-supplied list of paths. This is the inverse of the allowlist-based
  template-update action: new files added upstream are adopted automatically,
  and only the excluded paths (customer-tokenised values, backend config, the
  engine caller, etc.) are protected.
inputs:
  base-directory:
    description: "The base directory to sync the upstream template into"
    required: true
    default: "."
  enable-pull-request:
    description: "Whether to create a pull request"
    required: false
    default: "true"
  pull-request-title:
    description: "The title of the pull request"
    required: false
    default: ""
  branch-name:
    description: "The name of the branch to update"
    required: false
    default: ""
  template-repository:
    description: "The template repository to sync from"
    required: true
  template-branch:
    description: "The upstream branch to sync from"
    required: false
    default: main
  exclude-files:
    description: >-
      Newline-separated list of paths (relative to base-directory) to protect
      from the sync. rsync filter syntax is honoured, so trailing-slash
      directory rules and '*' globs work (e.g. "terraform/*.auto.tfvars").
      '.git' is always excluded regardless of this list.
    required: false
    default: ""
  upstream-token:
    description: "Token to authenticate with the upstream repository (defaults to github.token)"
    required: false

runs:
  using: "composite"
  steps:
    - name: Checkout Upstream Repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        token: ${{ inputs.upstream-token || github.token }}
        ref: ${{ inputs.template-branch }}
        repository: ${{ inputs.template-repository }}
        path: ./tmp/upstream-template

    - name: Sync Upstream Repository (excluding protected paths)
      shell: bash
      run: |
        set -euo pipefail

        base_dir="${{ inputs.base-directory }}"
        base_dir="${base_dir%/}"
        [[ -z "${base_dir}" ]] && base_dir="."

        # Build the rsync exclude arguments. .git is always excluded so the
        # upstream repository's history never leaks into the consumer repo.
        exclude_args=(--exclude=".git")
        while IFS= read -r path; do
          # Trim surrounding whitespace and skip blank lines / comments.
          path="${path#"${path%%[![:space:]]*}"}"
          path="${path%"${path##*[![:space:]]}"}"
          [[ -z "${path}" || "${path}" == \#* ]] && continue
          echo "Protecting path from sync: ${path}"
          exclude_args+=(--exclude="${path}")
        done <<< "${{ inputs.exclude-files }}"

        mkdir -p "${base_dir}"

        # --archive: preserve mode/times; NOT --delete — we never remove files
        # the consumer added on top of the template. Trailing slash on the source
        # copies the CONTENTS of the upstream repo into base_dir.
        echo "Syncing ${{ inputs.template-repository }} -> ${base_dir}"
        rsync --archive --human-readable \
          "${exclude_args[@]}" \
          ./tmp/upstream-template/ "${base_dir}/"

        rm -rf ./tmp/upstream-template

    - name: Check for Changes
      id: check-changes
      shell: bash
      run: |
        changed_files="$(git status --porcelain)"
        if [[ -n "${changed_files}" ]]; then
          echo "Changes detected in files:"
          echo "${changed_files}"
          echo "changes=true" >> "${GITHUB_OUTPUT}"
        else
          echo "No changes detected in files"
          echo "changes=false" >> "${GITHUB_OUTPUT}"
        fi

    # Step outputs are always strings — compare to 'true', not boolean true.
    - name: Create Pull Request
      if: inputs.enable-pull-request == 'true' && steps.check-changes.outputs.changes == 'true'
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
      with:
        base: main
        body: "This PR is syncing the templates to the latest version inline with the official ${{ inputs.template-repository }}"
        branch: update/${{ inputs.branch-name || github.run_id }}
        commit-message: "chore(deps): syncing the templates inline with the official ${{ inputs.template-repository }}"
        delete-branch: true
        title: "${{ inputs.pull-request-title }} | [UPDATE] - Syncing Templates inline with ${{ inputs.template-repository }}"
        token: ${{ github.token }}
